name: showcase
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"   # daily, keeps the badge fresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Secret scan (generic)
        run: bash scripts/check_secrets.sh .
      - name: Remote-only guard + tests
        env:
          PYTHONPATH: scripts
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q
      - name: Generate dashboard (clean runner, remote-only, no env header)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/build_dashboard.py \
            --config control-tower.config.example.toml --strict-remote-only --no-env -o dashboard.html
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
